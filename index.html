<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO 设置将由脚本注入 -->
    <title></title>
    <meta name="description" content="">
    <meta name="keywords" content="">
    
    <link id="dynamic-favicon" rel="icon" type="image/webp" href="">
    <link id="dynamic-apple-icon" rel="apple-touch-icon" href="">

    <style>
        /* ApparEdit v1.2.0
           Maintenance version - Added Responsive Configs (Desktop vs Mobile)
        */

        :root {
            --bg-color: #ffffff;    
            --text-color: #000000;  
            --border-color: #efefef;
            --muted-color: #999999; 
            --nav-h: 28px; 
            --side-padding: 20px; 
            --nav-footer-padding: 10px; 

            /* 动态样式占位符 */
            --primary-font: "Arial";
            --logo-size: 21px; --logo-weight: 600; --logo-color: #ffffff;
            --nav-link-size: 12px; --nav-link-weight: 600; --nav-link-color: #ffffff;
            --item-title-size: 13px; --item-title-weight: 500; --item-title-color: #000000;
            --footer-size: 11px; --footer-color: #999999;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --border-color: #111111;
                --muted-color: #666666;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0; padding: 0;
        }

        body {
            font-family: var(--primary-font), -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-h);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 var(--nav-footer-padding); z-index: 10000; 
            pointer-events: none; mix-blend-mode: difference; 
        }
        .brand, .nav-links, #menu-toggle { pointer-events: auto; text-decoration: none; }
        
        .brand { 
            font-weight: var(--logo-weight); 
            font-size: var(--logo-size); 
            color: var(--logo-color) !important;
            letter-spacing: -0.02em; 
        }
        .nav-links { 
            display: none; gap: 12px; 
            font-size: var(--nav-link-size); 
            font-weight: var(--nav-link-weight);
            color: var(--nav-link-color) !important;
        }
        @media (min-width: 768px) { .nav-links { display: flex; } }
        .nav-links a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        .nav-links a:hover { opacity: 0.5; }

        #menu-toggle {
            display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
            gap: 5px; background: none; border: none; cursor: pointer; width: 32px; height: var(--nav-h);
            color: var(--nav-link-color) !important;
        }
        #menu-toggle span { width: 18px; height: 1px; background-color: currentColor; transition: 0.3s; }
        @media (min-width: 768px) { #menu-toggle { display: none; } }

        #mobile-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 30px; visibility: hidden; opacity: 0; transition: 0.3s ease;
        }
        #mobile-menu.active { visibility: visible; opacity: 1; }
        #mobile-menu a { font-size: 16px; text-decoration: none; color: var(--text-color); font-weight: 600; }

        main {
            position: relative; flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 60px var(--side-padding); z-index: 1;
        }

        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background-color: var(--bg-color);
        }
        
        .bg-video, .bg-fallback-gif { 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            object-fit: cover; opacity: 0; 
            transition: opacity 1.5s; 
        }
        .bg-video.playing, .bg-fallback-gif.active { opacity: 1; }
        
        .bg-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #f3f3f3, #ffffff, #e9e9e9);
            background-size: 400% 400%; animation: gradientAnim 15s ease infinite; z-index: -2;
        }
        @keyframes gradientAnim {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }

        .contacts-list {
            display: flex; flex-direction: column; gap: 12px;
            width: 100%; max-width: 400px; text-align: center;
        }
        .contact-item {
            text-decoration: none; 
            color: var(--item-title-color); 
            font-size: var(--item-title-size);
            font-weight: var(--item-title-weight);
            padding: 10px; letter-spacing: 0.05em; transition: 0.4s;
        }
        .contact-item:hover { opacity: 0.4; transform: translateY(-2px); }

        footer { 
            padding: 0 var(--nav-footer-padding) 6px var(--nav-footer-padding); 
            display: flex; flex-direction: column; gap: 4px; z-index: 10; 
            text-align: center; align-items: center; margin-bottom: 4px; 
        }
        
        @media (min-width: 768px) { 
            footer { 
                flex-direction: row-reverse; justify-content: space-between; 
                align-items: flex-end; padding: 0 var(--nav-footer-padding) 8px var(--nav-footer-padding); 
                gap: 20px; margin-bottom: 0;
            } 
        }

        .copyright { font-size: var(--footer-size); color: var(--footer-color); letter-spacing: 0.02em; order: 2; }
        @media (min-width: 768px) { .copyright { order: unset; text-align: right; } }
        .copyright a { text-decoration: none; color: inherit; }

        .footer-extra {
            font-size: var(--footer-size); color: var(--footer-color); 
            letter-spacing: 0.01em; line-height: 1.4;
            text-transform: uppercase; white-space: pre-line; order: 1; 
        }
        @media (min-width: 768px) { .footer-extra { order: unset; text-align: left; } }

        ::-webkit-scrollbar { display: none; } 
    </style>
</head>
<body>

    <nav id="main-nav">
        <a href="#" class="brand" id="site-logo"></a>
        <div class="nav-links" id="desktop-links"></div>
        <button id="menu-toggle" aria-label="Menu">
            <span></span><span></span>
        </button>
    </nav>

    <div id="mobile-menu"></div>

    <main>
        <div id="bg-container"><div class="bg-gradient"></div></div>
        <div id="contacts-container" class="contacts-list"></div>
    </main>

    <footer>
        <div class="copyright">
            &copy; <span id="year"></span> <a href="#" id="footer-logo-link"><span id="footer-copy-text"></span></a>
        </div>
        <div class="footer-extra" id="footer-extra-info"></div>
    </footer>

    <script>
        /**
         * ==========================================
         * 小白配置区 (APP_DATA)
         * ==========================================
         */
        const APP_DATA = {
            // 1. SEO & 资源
            seo: {
                title: "PoorLegalGuy Contacts | Work, Consumerism & NeuePoor",
                description: "Official contact list and portal for PoorLegalGuy.",
                keywords: "PoorLegalGuy, Contacts, NeuePoor, Design, Art",
                favicon: "https://cdn.neuepoor.com/apparedit/image-035296a5-5b03-42bd-91b5-4fb17d40b48c.webp",
            },

            // 2. 宽屏模式 (桌面端 Desktop)
            desktop: {
                logo: { size: "21px", weight: "600", color: "#ffffff" },
                nav: { size: "12px", weight: "600", color: "#ffffff" },
                contacts: { size: "13px", weight: "500", color: "#000000" },
                footer: { size: "11px", color: "#999999" }
            },

            // 3. 窄屏模式 (手机端 Mobile)
            mobile: {
                logo: { size: "18px", weight: "700", color: "#ffffff" },
                nav: { size: "14px", weight: "600", color: "#ffffff" },
                contacts: { size: "15px", weight: "600", color: "#000000" },
                footer: { size: "10px", color: "#999999" }
            },

            // 4. 内容配置
            content: {
                logoText: "PoorLegalGuy",
                logoUrl: "https://neuepoor.com",
                navLinks: [
                    { name: "C", url: "https://neuepoor.com/library" },
                    { name: "N", url: "https://neuepoor.com/" },
                    { name: "Y", url: "https://contacts.neuepoor.com" }
                ],
                contactItems: [
                    { name: "Email", url: "mailto:hello@neuepoor.com" },
                    { name: "Instagram", url: "#" },
                    { name: "Discord", url: "#" },
                    { name: "Github", url: "#" },
                    { name: "RedBook", url: "#" },
                    { name: "WechatBlog", url: "#" },
                    { name: "Producer", url: "#" }
                ],
                footer: {
                    copyText: "PoorLegalGuy Contacts",
                    copyUrl: "https://neuepoor.com",
                    extraText: "Work, Consumerism & NeuePoor\n工作/消费/新穷人"
                }
            },

            // 5. 背景资源
            background: {
                videoUrl: "https://cdn.neuepoor.com/punkboyz.mp4",
                gifUrl: "https://cdn.neuepoor.com/punkboyz.gif"
            }
        };

        /**
         * ==========================================
         * 系统核心逻辑
         * ==========================================
         */

        function updateResponsiveStyles() {
            const root = document.documentElement;
            const isMobile = window.innerWidth < 768;
            const config = isMobile ? APP_DATA.mobile : APP_DATA.desktop;

            // 应用动态变量
            root.style.setProperty('--logo-size', config.logo.size);
            root.style.setProperty('--logo-weight', config.logo.weight);
            root.style.setProperty('--logo-color', config.logo.color);
            
            root.style.setProperty('--nav-link-size', config.nav.size);
            root.style.setProperty('--nav-link-weight', config.nav.weight);
            root.style.setProperty('--nav-link-color', config.nav.color);

            root.style.setProperty('--item-title-size', config.contacts.size);
            root.style.setProperty('--item-title-weight', config.contacts.weight);
            root.style.setProperty('--item-title-color', config.contacts.color);

            root.style.setProperty('--footer-size', config.footer.size);
            root.style.setProperty('--footer-color', config.footer.color);
        }

        function initContent() {
            // SEO
            document.title = APP_DATA.seo.title;
            document.getElementById('dynamic-favicon').href = APP_DATA.seo.favicon;
            document.getElementById('dynamic-apple-icon').href = APP_DATA.seo.favicon;

            // Logo & Footer Text
            document.getElementById('site-logo').innerText = APP_DATA.content.logoText;
            document.getElementById('site-logo').href = APP_DATA.content.logoUrl;
            document.getElementById('year').innerText = new Date().getFullYear();
            document.getElementById('footer-copy-text').innerText = APP_DATA.content.footer.copyText;
            document.getElementById('footer-logo-link').href = APP_DATA.content.footer.copyUrl;
            document.getElementById('footer-extra-info').innerText = APP_DATA.content.footer.extraText;

            // Render Links
            const dLinks = document.getElementById('desktop-links');
            const mMenu = document.getElementById('mobile-menu');
            APP_DATA.content.navLinks.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url; a.innerText = link.name;
                dLinks.appendChild(a.cloneNode(true));
                const ma = a.cloneNode(true);
                ma.onclick = () => document.getElementById('mobile-menu').classList.remove('active');
                mMenu.appendChild(ma);
            });

            const cContainer = document.getElementById('contacts-container');
            APP_DATA.content.contactItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url; a.className = "contact-item"; a.innerText = item.name;
                cContainer.appendChild(a);
            });
        }

        // 背景渲染
        async function renderBackground() {
            const bgContainer = document.getElementById('bg-container');
            const { videoUrl, gifUrl } = APP_DATA.background;
            
            let gifImg = null;
            if (gifUrl) {
                gifImg = document.createElement('img');
                gifImg.src = gifUrl;
                gifImg.className = "bg-fallback-gif";
                bgContainer.appendChild(gifImg);
            }

            if (!videoUrl) {
                if(gifImg) gifImg.classList.add('active');
                return;
            }

            const video = document.createElement('video');
            video.className = "bg-video";
            video.muted = true; video.loop = true; video.autoplay = true;
            video.setAttribute('muted', ''); 
            video.setAttribute('playsinline', 'true');
            video.setAttribute('webkit-playsinline', 'true'); 
            video.setAttribute('x5-video-player-type', 'h5-page'); 
            video.src = videoUrl;

            let videoStarted = false;
            video.onplaying = () => {
                videoStarted = true;
                video.classList.add('playing');
                if(gifImg) gifImg.classList.remove('active');
            };

            bgContainer.appendChild(video);

            const playVideoInWeChat = () => {
                if (window.WeixinJSBridge) {
                    window.WeixinJSBridge.invoke('getNetworkType', {}, () => video.play(), false);
                }
            };
            if (typeof WeixinJSBridge === "undefined") {
                document.addEventListener("WeixinJSBridgeReady", playVideoInWeChat, false);
            } else {
                playVideoInWeChat();
            }

            document.addEventListener('touchstart', () => {
                if(!videoStarted) video.play();
            }, { once: true });

            setTimeout(() => {
                if (!videoStarted && gifImg) gifImg.classList.add('active');
            }, 3000); 
        }

        // 菜单切换
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        menuToggle.onclick = () => {
            const isActive = mobileMenu.classList.toggle('active');
            const spans = menuToggle.querySelectorAll('span');
            spans[0].style.transform = isActive ? "rotate(45deg) translateY(4px)" : "none";
            spans[1].style.transform = isActive ? "rotate(-45deg) translateY(-4px)" : "none";
            document.body.style.overflow = isActive ? 'hidden' : '';
        };

        window.addEventListener('resize', updateResponsiveStyles);

        window.onload = () => {
            initContent();
            updateResponsiveStyles();
            renderBackground();
        };
    </script>
</body>
</html>
